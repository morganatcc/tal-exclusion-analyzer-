<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAL Revenue Calculator · CompanyCam ABX</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #1B4F72;
  --navy-light: #2C6FA0;
  --cream: #FAF9F6;
  --warm-gray: #f8f7f4;
  --border: #e8e4df;
  --text: #2d2d2d;
  --text-muted: #888;
  --red: #CC0000;
  --amber: #F59E0B;
  --green-light: #C6EFCE;
  --green-mid: #E2EFDA;
  --blue-light: #BDD7EE;
  --orange-light: #FCE4D6;
  --yellow-light: #FFF2CC;
  --pink-light: #FFC7CE;
  --gray-light: #D9D9D9;
  --row-alt: #e9f0f7;
  --font-display: 'DM Sans', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-display);
  background: var(--cream);
  color: var(--text);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 32px 24px 48px;
}

/* Header */
.header {
  margin-bottom: 28px;
  border-bottom: 3px solid var(--navy);
  padding-bottom: 16px;
}
.header h1 {
  font-size: 22px;
  font-weight: 700;
  color: var(--navy);
  letter-spacing: -0.3px;
}
.header p {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 4px;
}

/* Narrative Block */
.narrative {
  background: linear-gradient(135deg, #1B4F72 0%, #2C6FA0 100%);
  border-radius: 10px;
  padding: 18px 22px;
  margin-bottom: 20px;
  color: #fff;
}
.narrative-line {
  font-size: 13px;
  line-height: 1.6;
  padding: 3px 0;
  display: flex;
  align-items: flex-start;
  gap: 8px;
}
.narrative-line .icon {
  flex-shrink: 0;
  font-size: 12px;
  margin-top: 2px;
}

/* Filters */
.filters-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  align-items: flex-end;
  margin-bottom: 20px;
  padding: 16px 18px;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 10px;
}
.filter-group label {
  display: block;
  font-size: 10px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  margin-bottom: 4px;
}
.filter-group select {
  font-family: var(--font-display);
  font-size: 13px;
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: #fff;
  color: var(--text);
  cursor: pointer;
  min-width: 160px;
}

/* Multi-select dropdown */
.multi-select {
  position: relative;
  min-width: 170px;
}
.multi-select .trigger {
  padding: 6px 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
  font-size: 13px;
  background: #fff;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  user-select: none;
  white-space: nowrap;
}
.multi-select .trigger .arrow { font-size: 9px; color: var(--text-muted); margin-left: 8px; }
.multi-select .dropdown {
  display: none;
  position: absolute;
  top: 100%;
  left: 0;
  margin-top: 4px;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 8px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.1);
  z-index: 100;
  min-width: 240px;
  max-height: 320px;
  overflow-y: auto;
  padding: 4px 0;
}
.multi-select.open .dropdown { display: block; }
.multi-select .dropdown .option {
  padding: 6px 12px;
  font-size: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
}
.multi-select .dropdown .option:hover { background: var(--warm-gray); }
.multi-select .dropdown .option .cb {
  width: 16px; height: 16px;
  border-radius: 3px;
  border: 2px solid #ccc;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  color: #fff;
  flex-shrink: 0;
}
.multi-select .dropdown .option.checked .cb {
  background: var(--navy);
  border-color: var(--navy);
}
.multi-select .dropdown .option .dot {
  width: 8px; height: 8px;
  border-radius: 2px;
  display: inline-block;
  vertical-align: middle;
  margin-right: 4px;
}
.multi-select .dropdown .toggle-all {
  padding: 8px 12px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  border-bottom: 1px solid #f0f0f0;
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--navy);
}

/* Suggestions panel */
.suggestions {
  background: #fff;
  border: 1px solid var(--border);
  border-left: 4px solid var(--amber);
  border-radius: 10px;
  margin-bottom: 20px;
  overflow: hidden;
}
.suggestions-header {
  padding: 12px 18px;
  font-size: 13px;
  font-weight: 700;
  color: var(--navy);
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  user-select: none;
}
.suggestions-header:hover { background: var(--warm-gray); }
.suggestions-body { padding: 0 18px 16px; }
.suggestion-card {
  padding: 12px 14px;
  margin-bottom: 8px;
  border-radius: 8px;
  background: var(--warm-gray);
  border-left: 3px solid var(--amber);
}
.suggestion-card.high { border-left-color: var(--red); }
.suggestion-card .stitle {
  font-size: 13px;
  font-weight: 700;
  color: var(--navy);
  margin-bottom: 4px;
}
.suggestion-card .stitle .badge {
  font-size: 10px;
  font-weight: 600;
  padding: 1px 6px;
  border-radius: 4px;
  margin-left: 6px;
  vertical-align: middle;
}
.suggestion-card .stitle .badge.high { background: #FFC7CE; color: #CC0000; }
.suggestion-card .stitle .badge.medium { background: #FFF2CC; color: #B8860B; }
.suggestion-card p { font-size: 12px; color: #555; line-height: 1.55; }

/* Summary cards */
.cards-row {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
  margin-bottom: 24px;
}
.card {
  background: var(--warm-gray);
  border-radius: 8px;
  padding: 12px 14px;
}
.card .card-label { font-size: 11px; color: var(--text-muted); font-weight: 500; }
.card .card-value { font-size: 22px; font-weight: 700; margin-top: 2px; font-family: var(--font-mono); }

/* Tables */
.section-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--navy);
  margin: 0 0 8px;
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  margin-bottom: 24px;
}
table th {
  text-align: left;
  padding: 8px 10px;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #fff;
  background: var(--navy);
  border-bottom: 2px solid var(--navy);
  position: sticky;
  top: 0;
  z-index: 2;
}
table td { padding: 6px 10px; }
table tbody tr:nth-child(even) { background: var(--row-alt); }
table tbody tr:nth-child(odd) { background: #fff; }

.emp-sweet { background: var(--green-mid) !important; }
.tier-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
}
.tier-T1 { background: var(--green-light); }
.tier-T2 { background: var(--blue-light); }
.tier-T3 { background: var(--orange-light); }
.tier-T4 { background: var(--gray-light); }

.reason-dot {
  display: inline-block;
  width: 10px; height: 10px;
  border-radius: 2px;
  margin-right: 6px;
  vertical-align: middle;
}

.matrix-wrap { overflow-x: auto; margin-bottom: 24px; }
.matrix-wrap table { min-width: 700px; font-size: 11px; }
.matrix-wrap th, .matrix-wrap td { text-align: center; min-width: 55px; }
.matrix-wrap td:first-child, .matrix-wrap th:first-child {
  text-align: left;
  position: sticky;
  left: 0;
  z-index: 1;
  font-weight: 500;
  text-transform: capitalize;
}
.heat-50 { background: var(--green-light) !important; }
.heat-20 { background: var(--green-mid) !important; }
.heat-5 { background: var(--row-alt) !important; }

.gap-value { color: var(--red); font-weight: 600; }
.trade-name { font-weight: 500; text-transform: capitalize; }

.footer {
  font-size: 11px;
  color: #bbb;
  margin-top: 20px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}

/* Print styles */
@media print {
  body { background: #fff; }
  .filters-bar { display: none; }
  .suggestions { break-inside: avoid; }
  .container { padding: 12px; }
}

/* Responsive */
@media (max-width: 768px) {
  .cards-row { grid-template-columns: repeat(2, 1fr); }
  .filters-bar { flex-direction: column; }
}
</style>
</head>

};
const TIER_COLORS = {T1:"C6EFCE",T2:"BDD7EE",T3:"FCE4D6",T4:"D9D9D9"};

function getTier(acv){return acv>=50000?"T1":acv>=25000?"T2":acv>=10000?"T3":"T4";}
function getEmpRange(e){for(const r of EMP_RANGES)if(e>=r.lo&&e<=r.hi)return r.label;return "Unknown";}
function fmt(n){return n>=1e9?"$"+(n/1e9).toFixed(1)+"B":n>=1e6?"$"+(n/1e6).toFixed(1)+"M":n>=1000?"$"+(n/1000).toFixed(0)+"K":"$"+n.toFixed(0);}
function fmtN(n){return n.toLocaleString();}

// State
let selEmpRanges = EMP_RANGES.map(r=>r.label);
let allTrades = [], selTrades = [];
let allReasons = [], selReasons = [];
let suggestionsOpen = true;

// Init
(function init(){
  const counts = {};
  DATA.forEach(r=>{counts[r.t]=(counts[r.t]||0)+1;});
  allTrades = Object.entries(counts).sort((a,b)=>b[1]-a[1]).map(([t])=>t);
  selTrades = [...allTrades];
  const rs = new Set(DATA.map(r=>r.pr));
  allReasons = [...rs].sort();
  selReasons = [...allReasons];

  buildMultiSelect("ms-emp", EMP_RANGES.map(r=>r.label), selEmpRanges, v=>{selEmpRanges=v;render();});
  buildMultiSelect("ms-trades", allTrades, selTrades, v=>{selTrades=v;render();}, null, "trades");
  buildMultiSelect("ms-reasons", allReasons, selReasons, v=>{selReasons=v;render();}, REASON_COLORS, "reasons");

  render();
})();

function buildMultiSelect(id, options, selected, onChange, colorMap, label){
  const el = document.getElementById(id);
  el.innerHTML = '';
  const trigger = document.createElement('div');
  trigger.className = 'trigger';
  el.appendChild(trigger);
  const dropdown = document.createElement('div');
  dropdown.className = 'dropdown';
  el.appendChild(dropdown);

  function updateTrigger(){
    const all = selected.length === options.length;
    const none = selected.length === 0;
    const summary = all ? `All (${options.length})` : none ? "None" : selected.length === 1 ? selected[0] : `${selected.length} selected`;
    trigger.innerHTML = `<span style="overflow:hidden;text-overflow:ellipsis;max-width:140px;white-space:nowrap">${summary}</span><span class="arrow">▼</span>`;
  }

  function buildDropdown(){
    dropdown.innerHTML = '';
    const allSelected = selected.length === options.length;
    const toggleAll = document.createElement('div');
    toggleAll.className = 'toggle-all';
    toggleAll.innerHTML = `<span class="cb" style="width:16px;height:16px;border-radius:3px;border:2px solid var(--navy);background:${allSelected?'var(--navy)':'#fff'};display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff">${allSelected?'✓':''}</span>${allSelected?'Deselect all':'Select all'}`;
    toggleAll.onclick = (e)=>{e.stopPropagation(); selected.length = 0; if(!allSelected) options.forEach(o=>selected.push(o)); onChange(selected); buildDropdown(); updateTrigger(); render();};
    dropdown.appendChild(toggleAll);

    options.forEach(opt=>{
      const checked = selected.includes(opt);
      const div = document.createElement('div');
      div.className = 'option' + (checked ? ' checked' : '');
      const dotColor = colorMap && colorMap[opt] ? colorMap[opt].dot : null;
      div.innerHTML = `<span class="cb">${checked?'✓':''}</span>${dotColor?`<span class="dot" style="background:${dotColor}"></span>`:''}${opt}`;
      div.onclick = (e)=>{
        e.stopPropagation();
        const idx = selected.indexOf(opt);
        if(idx>=0) selected.splice(idx,1); else selected.push(opt);
        onChange(selected); buildDropdown(); updateTrigger(); render();
      };
      dropdown.appendChild(div);
    });
  }

  trigger.onclick = (e)=>{
    e.stopPropagation();
    document.querySelectorAll('.multi-select.open').forEach(ms=>{if(ms!==el)ms.classList.remove('open');});
    el.classList.toggle('open');
    buildDropdown();
  };
  updateTrigger();

  document.addEventListener('click',(e)=>{if(!el.contains(e.target))el.classList.remove('open');});
}

function render(){
  const revFloor = parseInt(document.getElementById('revFloor').value);

  const filtered = DATA.filter(r=>{
    if(revFloor>0 && r.r>0 && r.r<revFloor) return false;
    const er = getEmpRange(r.e);
    if(!selEmpRanges.includes(er)) return false;
    if(!selTrades.includes(r.t)) return false;
    if(!selReasons.includes(r.pr)) return false;
    return true;
  });

  const totals = {
    count: filtered.length,
    pot: filtered.reduce((s,r)=>s+r.p,0),

    gap: filtered.reduce((s,r)=>s+r.p-r.a,0),
    acqNeeded: Math.max(0, 5000 - filtered.length)
  };

  const reasonMap = {};
  filtered.forEach(r=>{if(!reasonMap[r.pr])reasonMap[r.pr]={count:0,pot:0,act:0};reasonMap[r.pr].count++;reasonMap[r.pr].pot+=r.p;reasonMap[r.pr].act+=r.a;});
  const reasonPivot = Object.entries(reasonMap).map(([reason,v])=>({reason,...v})).sort((a,b)=>b.pot-a.pot);

  const empPivot = EMP_RANGES.filter(rng=>selEmpRanges.includes(rng.label)).map(rng=>{
    const inR = filtered.filter(r=>r.e>=rng.lo&&r.e<=rng.hi);
    const tiers = {};
    inR.forEach(r=>{const t=getTier(r.p);tiers[t]=(tiers[t]||0)+1;});
    return {label:rng.label,count:inR.length,pot:inR.reduce((s,r)=>s+r.p,0),act:inR.reduce((s,r)=>s+r.a,0),tiers};
  }).filter(r=>r.count>0);

  const tradeMap = {};
  filtered.forEach(r=>{if(!tradeMap[r.t])tradeMap[r.t]={count:0,pot:0,act:0,emp:0};tradeMap[r.t].count++;tradeMap[r.t].pot+=r.p;tradeMap[r.t].act+=r.a;tradeMap[r.t].emp+=r.e;});
  const tradePivot = Object.entries(tradeMap).map(([t,v])=>({trade:t,...v,avgEmp:v.count?Math.round(v.emp/v.count):0})).sort((a,b)=>b.pot-a.pot).slice(0,20);

  const activeRanges = EMP_RANGES.filter(rng=>selEmpRanges.includes(rng.label));
  const matrix = {};
  filtered.forEach(r=>{const er=getEmpRange(r.e);const k=r.t+"|"+er;if(!matrix[k])matrix[k]={count:0,pot:0};matrix[k].count++;matrix[k].pot+=r.p;});
  const matTrades = {};
  filtered.forEach(r=>{matTrades[r.t]=(matTrades[r.t]||0)+r.p;});
  const matrixTrades = Object.entries(matTrades).sort((a,b)=>b[1]-a[1]).slice(0,15).map(([t])=>t);

  // ── Render narrative ──
  const narr = document.getElementById('narrative');
  const icons = {context:'📊',revenue:'💰',gap:'🎯',win:'✅',flag:'🚩',trade:'🏗️',sweet:'🎯'};
  const lines = [];
  const REV_LABELS = {"0":"No floor","10000000":"$10M","15000000":"$15M","20000000":"$20M","25000000":"$25M","30000000":"$30M","50000000":"$50M"};
  const revLabel = REV_LABELS[revFloor] || "Custom";
  const empAll = selEmpRanges.length===EMP_RANGES.length;
  const tradeAll = selTrades.length===allTrades.length;
  const reasonAll = selReasons.length===allReasons.length;
  const isDefault = revFloor===25000000 && empAll && tradeAll && reasonAll;

  if(isDefault) lines.push({t:'context',x:`Showing all ${fmtN(totals.count)} flagged accounts at the default $25M revenue floor.`});
  else {
    const parts = [];
    if(revFloor!==25000000) parts.push(`revenue floor set to ${revLabel}`);
    if(!empAll) parts.push(`${selEmpRanges.length} of ${EMP_RANGES.length} employee ranges`);
    if(!tradeAll) parts.push(`${selTrades.length} of ${allTrades.length} trades`);
    if(!reasonAll) parts.push(`${selReasons.length} of ${allReasons.length} flag reasons`);
    lines.push({t:'context',x:`Filtered to ${fmtN(totals.count)} accounts`+(parts.length>0?` (${parts.join(", ")}).`:`.`)});
  }

  const captureRate = totals.pot>0?(totals.act/totals.pot)*100:0;
  if(totals.pot>0) lines.push({t:'revenue',x:`${fmt(totals.pot)} potential ACV, ${fmt(totals.act)} captured (${captureRate.toFixed(1)}%) — ${fmt(totals.gap)} expansion gap.`});
  if(totals.acqNeeded>0) lines.push({t:'gap',x:`${fmtN(totals.acqNeeded)} more accounts needed to hit the 5K target.`});
  else lines.push({t:'win',x:`This filtered set already exceeds the 5K account target.`});
  if(reasonPivot.length>0){const topR=reasonPivot[0];const pct=totals.count>0?((topR.count/totals.count)*100).toFixed(0):0;lines.push({t:'flag',x:`Top flag: "${topR.reason}" — ${fmtN(topR.count)} accounts (${pct}%), ${fmt(topR.pot)} potential.`});}
  if(tradePivot.length>0){const topT=tradePivot[0];lines.push({t:'trade',x:`Leading trade: ${topT.trade} (${fmtN(topT.count)} accounts, ${fmt(topT.pot)} potential ACV).`});}
  const ss50=empPivot.find(r=>r.label==="50-250"),ss251=empPivot.find(r=>r.label==="251-500");
  const ssCount=(ss50?.count||0)+(ss251?.count||0),ssPot=(ss50?.pot||0)+(ss251?.pot||0);
  if(ssCount>0){const pct=totals.count>0?((ssCount/totals.count)*100).toFixed(0):0;lines.push({t:'sweet',x:`MM sweet spot (50-500 emp): ${fmtN(ssCount)} accounts (${pct}%), ${fmt(ssPot)} potential.`});}

  narr.innerHTML = lines.map(l=>`<div class="narrative-line"><span class="icon">${icons[l.t]||'•'}</span><span>${l.x}</span></div>`).join('');

  // ── Suggestions ──
  const sugs = [];
  const stripeFlag=reasonPivot.find(r=>r.reason==="Missing Stripe Data");
  if(stripeFlag&&stripeFlag.count>0){const pct=totals.count>0?((stripeFlag.count/totals.count)*100).toFixed(0):0;sugs.push({p:'high',title:'Close the Stripe data gap',text:`${fmtN(stripeFlag.count)} accounts (${pct}%) are flagged for missing Stripe data — you can't size the expansion opportunity without it. Prioritize enrichment through ZoomInfo or direct Stripe reconciliation.`});}
  const unknownTrade=reasonPivot.find(r=>r.reason==="Unknown Trade");
  if(unknownTrade&&unknownTrade.count>20) sugs.push({p:'high',title:'Classify unknown trades',text:`${fmtN(unknownTrade.count)} accounts have an unknown trade. Trade classification drives persona mapping, messaging, and 6sense keyword targeting.`});
  if(captureRate<5&&totals.pot>0) sugs.push({p:'high',title:'Run expansion plays on existing customers',text:`Capture rate is ${captureRate.toFixed(1)}% — massive whitespace. For T1/T2 existing customers, run lateral expansion and executive expansion plays.`});
  else if(captureRate<15&&totals.pot>0) sugs.push({p:'medium',title:'Accelerate seat expansion',text:`Capture rate is ${captureRate.toFixed(1)}%. Focus AE attention on accounts with existing users but low penetration.`});
  const belowRev=reasonPivot.find(r=>r.reason?.includes("Below Rev Floor"));
  if(belowRev&&belowRev.count>50) sugs.push({p:'medium',title:'Evaluate rev floor threshold',text:`${fmtN(belowRev.count)} accounts sit below the revenue floor. Consider whether a lower floor opens a viable sub-segment.`});

  const sugPanel = document.getElementById('suggestions-panel');
  if(sugs.length>0){
    sugPanel.style.display='block';
    sugPanel.innerHTML = `<div class="suggestions-header" onclick="suggestionsOpen=!suggestionsOpen;render();">ABX Suggestions (${sugs.length})<span>${suggestionsOpen?'▲':'▼'}</span></div>`
      + (suggestionsOpen ? `<div class="suggestions-body">${sugs.map(s=>`<div class="suggestion-card ${s.p}"><div class="stitle">${s.title}<span class="badge ${s.p}">${s.p}</span></div><p>${s.text}</p></div>`).join('')}</div>` : '');
  } else sugPanel.style.display='none';

  // ── Cards ──
  document.getElementById('cards').innerHTML = [
    {label:'Filtered accounts',value:fmtN(totals.count),color:'var(--navy)'},
    {label:'Potential ACV',value:fmt(totals.pot),color:'var(--navy)'},
    {label:'Actual ACV',value:fmt(totals.act),color:'#666'},
    {label:'Expansion gap',value:fmt(totals.gap),color:'var(--red)'},
    {label:'Acq needed for 5K',value:fmtN(totals.acqNeeded),color:'var(--amber)'},
  ].map(c=>`<div class="card"><div class="card-label">${c.label}</div><div class="card-value" style="color:${c.color}">${c.value}</div></div>`).join('');

  // ── Reason table ──
  const tblR = document.getElementById('tbl-reason');
  tblR.querySelector('thead tr').innerHTML = ['Reason','Accounts','Potential ACV','Actual ACV','Gap'].map(h=>`<th>${h}</th>`).join('');
  tblR.querySelector('tbody').innerHTML = reasonPivot.map((r,i)=>{
    const dc = REASON_COLORS[r.reason]?.dot||'#ccc';
    return `<tr><td style="font-weight:600"><span class="reason-dot" style="background:${dc}"></span>${r.reason}</td><td>${fmtN(r.count)}</td><td>${fmt(r.pot)}</td><td>${fmt(r.act)}</td><td class="gap-value">${fmt(r.pot-r.act)}</td></tr>`;
  }).join('');

  // ── Emp table ──
  const tblE = document.getElementById('tbl-emp');
  tblE.querySelector('thead tr').innerHTML = ['Range','Accounts','Potential ACV','Gap','T1','T2','T3','T4'].map(h=>`<th>${h}</th>`).join('');
  tblE.querySelector('tbody').innerHTML = empPivot.map((r,i)=>{
    const sweet = (r.label==='50-250'||r.label==='251-500') ? ' class="emp-sweet"' : '';
    const tierCells = ['T1','T2','T3','T4'].map(t=>r.tiers[t]?`<td style="text-align:center"><span class="tier-badge tier-${t}">${r.tiers[t]}</span></td>`:`<td style="text-align:center;color:#ddd">-</td>`).join('');
    return `<tr${sweet}><td style="font-weight:600">${r.label}</td><td>${fmtN(r.count)}</td><td>${fmt(r.pot)}</td><td class="gap-value">${fmt(r.pot-r.act)}</td>${tierCells}</tr>`;
  }).join('');

  // ── Trade table ──
  const tblT = document.getElementById('tbl-trade');
  tblT.querySelector('thead tr').innerHTML = ['Trade','Accounts','Potential ACV','Actual ACV','Gap','Avg Emp'].map(h=>`<th>${h}</th>`).join('');
  tblT.querySelector('tbody').innerHTML = tradePivot.map(r=>`<tr><td class="trade-name">${r.trade}</td><td>${fmtN(r.count)}</td><td>${fmt(r.pot)}</td><td>${fmt(r.act)}</td><td class="gap-value">${fmt(r.pot-r.act)}</td><td>${fmtN(r.avgEmp)}</td></tr>`).join('');

  // ── Matrix ──
  const tblM = document.getElementById('tbl-matrix');
  tblM.querySelector('thead tr').innerHTML = `<th>Trade</th>${activeRanges.map(r=>`<th>${r.label}</th>`).join('')}<th>Total</th>`;
  tblM.querySelector('tbody').innerHTML = matrixTrades.map(t=>{
    const rowTotal = activeRanges.reduce((s,rng)=>s+(matrix[t+"|"+rng.label]?.count||0),0);
    const cells = activeRanges.map(rng=>{
      const c = matrix[t+"|"+rng.label]?.count||0;
      const cls = c>=50?'heat-50':c>=20?'heat-20':c>=5?'heat-5':'';
      return `<td class="${cls}">${c>0?c:'<span style="color:#ddd">-</span>'}</td>`;
    }).join('');
    return `<tr><td>${t}</td>${cells}<td style="font-weight:700">${rowTotal}</td></tr>`;
  }).join('');

  document.getElementById('footer').textContent = `TAL Revenue Calculator · Combined Apr 7 + Apr 8 · ${DATA.length.toLocaleString()} flagged accounts`;
}
</script>
</body>
</html>
